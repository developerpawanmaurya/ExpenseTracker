name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Repo subpath, e.g. /expense-tracker-react/
          VITE_BASE_PATH: /https://developerpawanmaurya.github.io/ExpenseTracker/
          VITE_SUPABASE_URL: https://xacxfidueftdhqzugcqb.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhY3hmaWR1ZWZ0ZGhxenVnY3FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTAwNTEsImV4cCI6MjA5Mjc4NjA1MX0.75MDM4Jc-W1plQUxE09RO6mCQsyCgsf4KRdOt9Jt6Ew
        run: npm run build

      # Make GitHub Pages serve refreshes correctly for an SPA.
      - name: Add 404.html SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
